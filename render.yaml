services:
  # ── Backend API (Express + Socket.IO + BullMQ workers) ────────────────────────
  # NOTE: BullMQ workers run in-process (index.ts calls startWorkers()).
  # A separate worker service is not needed on the free plan.
  - type: web
    name: habitloop-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set in Render dashboard → your Neon URL
      - key: REDIS_URL
        sync: false          # set in Render dashboard → Upstash rediss:// URL
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false          # set in Render dashboard → your Vercel URL
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "1000"

