version: '3.9'

# ─── Shared environment fragment ──────────────────────────────────────────────
x-backend-env: &backend-env
  NODE_ENV: ${NODE_ENV:-production}
  DATABASE_URL: postgresql://${POSTGRES_USER:-habitloop}:${POSTGRES_PASSWORD:-habitloop_secret}@postgres:5432/${POSTGRES_DB:-habitloop_db}
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80}
  RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-1000}
  RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: habitloop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-habitloop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habitloop_secret}
      POSTGRES_DB: ${POSTGRES_DB:-habitloop_db}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-habitloop}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: habitloop_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: habitloop-backend:latest
    container_name: habitloop_backend
    restart: unless-stopped
    environment:
      <<: *backend-env
      PORT: 4000
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Worker (BullMQ) ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: worker.Dockerfile
      target: production
    image: habitloop-worker:latest
    container_name: habitloop_worker
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  # ─── Frontend (Nginx) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    image: habitloop-frontend:latest
    container_name: habitloop_frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: habitloop_network
